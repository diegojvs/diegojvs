<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#171717">
    <title>Diego Vergara</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://kit.fontawesome.com/5c93ae52db.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="slide">
            <div class="slide-container">
                <h1 class="title">Diego Vergara</h1>
                <p class="subtitle">Estudiante de Ingeniería Civil en Informatíca y Telecomunicaciones</p>
            </div>
        </div>
        <div class="slide">
            <div class="slide-container">
                <h2 class="title-b">Conocimientos</h2>
                <div class="container-skills">
                    <div class="card">
                        <i class="fab fa-html5 skils-i"></i>
                        <p class="skills">HTML</p>
                    </div>
                    
                    <div class="card">
                        <i class="fab fa-css3-alt skils-i"></i>
                        <p class="skills">CSS</p>
                    </div>
                    <div class="card">
                        <i class="fab fa-js skils-i"></i>
                        <p class="skills">JavaScript</p>
                    </div>
                    <div class="card">
                        <i class="fab fa-react skils-i"></i>
                        <p class="skills">React</p>
                    </div>
                </div>    
            </div>
        </div>
        <div class="slide">
            <div class="slide-container">
                <h2 class="title-b">Proyectos</h2>
                <div class="container-skills">
                    <div class="card-proyect">
                        <img class="img-proyect" src="assets/pokedex.png" alt="pokedex">
                        <p class="proyect-title">Pokédex</p>
                        <p class="description">Pokédex realizada con React</p>
                        <a href="https://github.com/diegojvs/pokedex" target="_blank" title="Código"><i class="fas fa-code i-proyect"></i></a>
                        <a href="https://diego-pokedex.netlify.app/" target="_blank" title="Ir al proyecto"><i class="fas fa-external-link-alt i-proyect"></i></a>
                    </div>
                </div>    
            </div>
        </div>
    </div>

</body>
</html>
